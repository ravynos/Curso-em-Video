<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variaveis</title>
    <style>
        body {
            background-color: black;
            font: normal 5pt Arial;
            color: aliceblue;            
        }

    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual o seu nome?')
        var idade = prompt('Qual a sua idade?')
        var profissao = prompt('Qual sua profissão?')
        document.write(`Ola, ${nome} tem ${nome.length} letras.<br/>`)
        document.write(`Vc tem ${idade} anos!!!<br/>`)
        document.write(`Vc trabalha como ${profissao}.<br/>`)
        document.write(`Seu nome em MAIÚSCULO fica assim ${nome.toUpperCase()}.<br/>`)
        document.write(`Seu nome em minúsculo fica assim ${nome.toLowerCase()}.<br/>`)
    </script>
</body>
</html>
